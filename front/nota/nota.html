<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="nota.css">
    <title>EduGrade - Gestão de Notas</title>
</head>
<body>
    <div class="header-actions">
        <a href="../home/home.html" class="btn-voltar">← Voltar</a>
        <button id="btn">Carregar Notas</button>
    </div>

    <h4>Nova Nota</h4>
    <div class="form">
        <select id="alunoID"></select>
        <select id="disciplinaID"></select>
        <input type="text" id="nota" placeholder="Nota">
        <button id="btnSalvar">Salvar Nota</button>
    </div>

    <h3>Lista de Notas</h3>

    <div class="search-box">
        <input type="text" id="buscar" placeholder="🔍 Buscar aluno...">
    </div>

    <div class="table-container">
        <table id="listagem">
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Disciplina</th>
                    <th>Nota</th>
                    <th style="text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <div id="lista_alterar">
        <h3>Alterar Nota</h3>
        <p>Aluno</p>
        <select id="editAluno"></select>
        <p>Disciplina</p>
        <select id="editDisciplina"></select>
        <p>Nota</p>
        <input type="number" id="editNota">
        <button id="btn-alterar">Salvar Alterações</button>
        <button id="fechar-janela">Fechar</button>
    </div>

    <script src="notaFront.js"></script>
</body>
</html>
