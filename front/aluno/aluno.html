<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="aluno.css">
    <title>EduGrade - Gestão de Alunos</title>
</head>

<body>
    <div class="header-actions">
        <a href="../home/home.html" class="btn-voltar">← Voltar</a>
        <button id="btn">Carregar alunos</button>
    </div>

    <h4>Novo aluno</h4>
    <div class="form">
        <input type="text" id="campoNome" placeholder="Nome do aluno">
        <input type="text" id="campoIdade" placeholder="Idade">
        <input type="text" id="campoCPF" placeholder="CPF">
        <button id="btnSalvar">Salvar Aluno</button>
    </div>

    <h3>Lista de Alunos</h3>

    <div class="search-box">
        <input type="text" id="buscar" placeholder="🔍 Buscar aluno...">
    </div>

    <div class="table-container">
        <table id="listagem">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>CPF</th>
                    <th style="text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
            </tbody>
        </table>
    </div>

    <div id="lista_alterar">
        <h3>Alterar aluno</h3>
        <p>Nome do aluno</p>
        <input type="text" id="editNome">
        <p>Idade do aluno</p>
        <input type="text" id="editIdade">
        <p>CPF do aluno</p>
        <input type="text" id="editCPF">

        <button id="btn-alterar">Salvar Alterações</button>
        <button id="fechar-janela">Fechar</button>
    </div>

    <script src="alunoFront.js"></script>
</body>

</html>
